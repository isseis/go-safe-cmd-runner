# CodeQL advanced setup (replaces GitHub's default setup) so we can scope it with
# paths-ignore: documentation-only changes (*.md / docs/ / .devcontainer/ / LICENSE)
# do not trigger a full CodeQL analysis, matching the docs-skip classification in
# ci.yml's check-changes job. The weekly schedule still runs a full scan regardless
# of paths.
name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".devcontainer/**"
      - "LICENSE"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".devcontainer/**"
      - "LICENSE"
  schedule:
    - cron: '44 7 * * 6'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: go
          build-mode: autobuild
        - language: python
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
