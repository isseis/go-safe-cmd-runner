services:
  dev-env:
    build:
      context: ../..
      dockerfile: .devcontainer/Dockerfile
    environment:
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
    volumes:
      - ../..:/workspaces/ubuntu:cached
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
      - ~/.ssh/id_ed25519.pub:/home/issei/.ssh/id_ed25519.pub:ro
      # 認証情報の永続化（Mac ホストと共有）
      - ~/.config/gh:/home/issei/.config/gh
      - ~/.claude:/home/issei/.claude
    # コンテナを維持するためのコマンド
    command: /bin/sh -c "while sleep 1000; do :; done"
